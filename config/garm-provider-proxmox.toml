[pve]
host = "192.168.80.95:8006"
user = "garm@pve"
token_name = "garm"
token_value = "5b6b404d-22ac-4aa7-98d3-e23b46da0e23"
verify_ssl = false

[cluster]
node = "beelzebub"
pool = "garm"
storage = "foliant"
bridge = "vmbrnat1"

[flavors.default]
cores = 2
memory_mb = 4096

[flavors.large]
cores = 4
memory_mb = 8192

# Map GARM image names to Proxmox templates
# The key (e.g., "garm-ubuntu-slim-runner") must match BOTH:
# 1. The image name requested in GARM
# 2. The exact name of the Proxmox template being cloned
[images.garm-ubuntu-slim-runner]
type = "lxc"
lxc_unprivileged = true

[images.garm-ubuntu-runner-vm]
type = "vm"

[images.garm-windows-2022-runner]
type = "vm"
